<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI FAQ Chatbot — CodeAlpha</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d1117;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 12px;
      color: #e6edf3;
    }
    .header-card {
      width: 100%;
      max-width: 700px;
      background: linear-gradient(135deg, #1a1f2e, #0d1117);
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }
    .bot-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #238636, #1f6feb);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .header-card h1 { font-size: 20px; color: #e6edf3; font-weight: 700; }
    .header-card p { margin-top: 4px; color: #7d8590; font-size: 12px; }
    .online-dot {
      margin-left: auto;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #238636;
      box-shadow: 0 0 8px #238636;
      flex-shrink: 0;
    }
    .chips {
      width: 100%;
      max-width: 700px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .chip {
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(31,111,235,0.12);
      border: 1px solid rgba(31,111,235,0.3);
      color: #58a6ff;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .chip:hover { background: rgba(31,111,235,0.25); }
    .chat-window {
      width: 100%;
      max-width: 700px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 460px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; margin-top: 2px;
    }
    .avatar.bot { background: linear-gradient(135deg, #238636, #1f6feb); }
    .avatar.user { background: #21262d; border: 1px solid #30363d; }
    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      border-radius: 4px 16px 16px 16px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
    }
    .msg.user .bubble {
      border-radius: 16px 4px 16px 16px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border: none;
    }
    .source-tag {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #30363d;
      font-size: 11px;
      color: #7d8590;
    }
    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #58a6ff;
      animation: bounce 1s ease infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    .input-row {
      padding: 14px 16px;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 10px;
      background: #0d1117;
    }
    #userInput {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 11px 14px;
      color: #e6edf3;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      resize: none;
    }
    #userInput::placeholder { color: #484f58; }
    .send-btn {
      padding: 11px 18px;
      border-radius: 10px;
      background: linear-gradient(135deg, #238636, #1f6feb);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .send-btn:disabled { background: #21262d; cursor: not-allowed; }
    .footer { color: #30363d; font-size: 11px; margin-top: 16px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

  <div class="header-card">
    <div class="bot-icon">🤖</div>
    <div>
      <h1>AI FAQ Chatbot</h1>
      <p>CodeAlpha Internship — Task 2 · NLP + Claude AI</p>
    </div>
    <div class="online-dot"></div>
  </div>

  <div class="chips">
    <button class="chip" onclick="setInput('What is Machine Learning?')">Machine Learning</button>
    <button class="chip" onclick="setInput('What is Deep Learning?')">Deep Learning</button>
    <button class="chip" onclick="setInput('What is NLP?')">NLP</button>
    <button class="chip" onclick="setInput('What is Python used for in AI?')">Python in AI</button>
  </div>

  <div class="chat-window">
    <div class="messages" id="messages">
      <div class="msg">
        <div class="avatar bot">🤖</div>
        <div class="bubble">👋 Hello! I'm an AI FAQ Assistant. Ask me anything about Artificial Intelligence, Machine Learning, or related topics!<br><br>Type <strong>list</strong> to see all available FAQs.</div>
      </div>
    </div>
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Ask about AI, ML, Deep Learning... (Enter to send)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <p class="footer">Built with NLP cosine similarity + Claude AI · CodeAlpha Internship</p>

  <script>
    const FAQS = [
      { q: "What is Artificial Intelligence?", a: "Artificial Intelligence (AI) is the simulation of human intelligence in machines, enabling them to think, learn, and problem-solve like humans." },
      { q: "What is Machine Learning?", a: "Machine Learning is a subset of AI where systems learn from data to improve performance over time without being explicitly programmed." },
      { q: "What is Deep Learning?", a: "Deep Learning is a type of machine learning using neural networks with many layers to model complex patterns in data." },
      { q: "What is Natural Language Processing?", a: "NLP is a branch of AI that helps computers understand, interpret, and generate human language. It powers chatbots, translators, and voice assistants." },
      { q: "What is NLP?", a: "NLP (Natural Language Processing) is a branch of AI that enables computers to understand and generate human language." },
      { q: "What is a Neural Network?", a: "A neural network is a computing system inspired by the brain, consisting of layers of nodes that process data to recognize patterns." },
      { q: "What is Computer Vision?", a: "Computer Vision is an AI field that trains computers to interpret and understand visual information from images and videos." },
      { q: "What is ChatGPT?", a: "ChatGPT is an AI chatbot developed by OpenAI using the GPT architecture, capable of generating human-like text conversations." },
      { q: "What is reinforcement learning?", a: "Reinforcement learning is an ML technique where an agent learns by interacting with an environment, receiving rewards for correct actions." },
      { q: "What is overfitting in ML?", a: "Overfitting occurs when a model learns training data too well including noise, causing poor performance on new unseen data." },
      { q: "What is Python used for in AI?", a: "Python is the most popular AI/ML language due to its simplicity and rich libraries like TensorFlow, PyTorch, NumPy, and Scikit-learn." },
    ];

    function cosineSimilarity(a, b) {
      const words = [...new Set([...a.split(" "), ...b.split(" ")])];
      const vec = str => words.map(w => str.split(" ").filter(x => x === w).length);
      const va = vec(a), vb = vec(b);
      const dot = va.reduce((s, v, i) => s + v * vb[i], 0);
      const mag = v => Math.sqrt(v.reduce((s, x) => s + x * x, 0));
      return dot / (mag(va) * mag(vb) || 1);
    }

    function findBestMatch(query) {
      const q = query.toLowerCase().replace(/[^a-z0-9 ]/g, "");
      let best = null, bestScore = 0;
      for (const faq of FAQS) {
        const score = cosineSimilarity(q, faq.q.toLowerCase().replace(/[^a-z0-9 ]/g, ""));
        if (score > bestScore) { bestScore = score; best = faq; }
      }
      return bestScore > 0.1 ? best : null;
    }

    function setInput(text) {
      document.getElementById('userInput').value = text;
      document.getElementById('userInput').focus();
    }

    function addMessage(role, text, source = null) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === 'bot' ? '🤖' : '👤';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      if (source) {
        const tag = document.createElement('div');
        tag.className = 'source-tag';
        tag.textContent = '📚 Matched: ' + source;
        bubble.appendChild(tag);
      }
      div.appendChild(avatar);
      div.appendChild(bubble);
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg'; div.id = 'typing';
      div.innerHTML = `<div class="avatar bot">🤖</div><div class="bubble typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage('user', text);
      document.getElementById('sendBtn').disabled = true;
      showTyping();
      await new Promise(r => setTimeout(r, 600));

      if (text.toLowerCase() === 'list' || text.toLowerCase().includes('show all')) {
        removeTyping();
        const list = FAQS.map((f, i) => `${i + 1}. ${f.q}`).join('\n');
        addMessage('bot', '📋 Available FAQs:\n\n' + list + '\n\nAsk me any of these!');
        document.getElementById('sendBtn').disabled = false;
        return;
      }

      const match = findBestMatch(text);
      if (match) {
        removeTyping();
        addMessage('bot', '💡 ' + match.a, match.q);
        document.getElementById('sendBtn').disabled = false;
        return;
      }

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{
              role: 'user',
              content: `You are an AI/ML FAQ chatbot. Answer concisely in 2-3 sentences: "${text}". If unrelated to tech/AI, say you only answer AI-related questions.`
            }]
          })
        });
        const data = await response.json();
        removeTyping();
        addMessage('bot', '🤖 ' + (data.content?.[0]?.text || 'Could not get answer.'));
      } catch {
        removeTyping();
        addMessage('bot', '⚠️ Something went wrong. Please try again.');
      } finally {
        document.getElementById('sendBtn').disabled = false;
      }
    }

    document.getElementById('userInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
  </html>
